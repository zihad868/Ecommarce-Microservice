syntax = "proto3";

package product;

service ProductService {
  rpc GetProduct (ProductRequest) returns (ProductResponse) {}
}

message ProductRequest {
  string productId = 1;
}

message ProductResponse {
  bool success = 1;
  string id = 2;
  string name = 3;
  double price = 4;
  int32 stock = 5;
  string error = 6;
}
